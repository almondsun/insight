name: Feature request
description: Propose a focused improvement to insIGht
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the workflow and expected result.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy or compatibility considerations
      description: Note any effect on stored data, exports, imports, or network behavior.
