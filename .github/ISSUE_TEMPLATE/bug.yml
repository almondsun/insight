name: Bug report
description: Report reproducible incorrect behavior without sharing personal data
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Never attach a real Instagram export, database, username list, or login secret.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Launch insIGht\n2. Import a sanitized fixture\n3. ..."
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: insIGht version or commit
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Sanitized logs or context
      description: Remove usernames, paths, and other personal information.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal Instagram data from this report.
          required: true
